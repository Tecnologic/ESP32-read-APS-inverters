; ==============================================================================
; PlatformIO configuration for ESP32-read-APS-inverters
; https://github.com/patience4711/ESP32-read-APS-inverters
;
; UPSTREAM COMPATIBILITY
; ----------------------
; All source files stay in the project root (unchanged from upstream).
; This lets both Arduino IDE and PlatformIO build the same files without
; any restructuring, so `git merge` / `git pull` from upstream works cleanly.
;
; USAGE
; -----
; Build:   pio run -e esp32dev
; Upload:  pio run -e esp32dev --target upload
; Monitor: pio device monitor
; ==============================================================================

[platformio]
; Use the project root as source directory so that all .ino files remain
; alongside the .h headers exactly as Arduino IDE expects them.
src_dir     = .
include_dir = .

default_envs = esp32dev

; ==============================================================================
; Shared settings used by every environment
; ==============================================================================
[env]
platform  = espressif32
framework = arduino

; Serial monitor / upload speed
monitor_speed = 115200
upload_speed  = 921600

; Partition scheme: default 4 MB layout with OTA + SPIFFS
; app0/app1: 1.25 MB each  |  spiffs: 1.44 MB
board_build.partitions = default.csv

; Exclude the old standalone v0.9 sketch file.
; It defines its own setup() / loop() which would clash with the current
; ESP32_ECU_v1_4.ino sketch when compiled together.
src_filter = +<*> -<ESP32-ECU_v0-9.ino>

; Library dependencies
; ESP32 built-ins (WiFi, SPIFFS, EEPROM, Preferences, Update, DNSServer,
; Ticker, esp_wifi, …) come with the espressif32 platform automatically.
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.5
    dvarrel/ESPAsyncWebSrv @ ^1.2.7
    dvarrel/AsyncTCP @ ^3.1.4
    knolleary/PubSubClient @ ^2.8.0
    arduino-libraries/NTPClient @ ^3.2.1
    paulstoffregen/Time @ ^1.6.1
    s6raptor/SunMoon @ ^2.1.0

; ==============================================================================
; Default / production environment  (ESP32 Dev WROOM32)
; ==============================================================================
[env:esp32dev]
board = esp32dev

build_flags =
    -DCORE_DEBUG_LEVEL=0

; ==============================================================================
; Debug environment  – verbose ESP-IDF log output on Serial
; ==============================================================================
[env:esp32dev_debug]
board = esp32dev

build_type = debug

build_flags =
    -DCORE_DEBUG_LEVEL=4
    -DDEBUG_ESP_PORT=Serial
